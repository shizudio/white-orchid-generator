<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The White Orchid — Marketing Site (UI Kit)</title>
  <link rel="icon" href="../../assets/logo-circle.png" />
  <link rel="stylesheet" href="site.css?v=4" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Pages.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [route, setRoute] = useState('home');
      const Page = window.PAGES[route] || window.PAGES.home;
      return (
        <div data-screen-label={route}>
          <Header route={route} setRoute={setRoute} />
          <main key={route}><Page setRoute={setRoute} /></main>
          <Footer setRoute={setRoute} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
