<!doctype html>
<!-- @dsCard group="Components" name="Form fields" subtitle="Input · select · textarea · checkbox" viewport="700x280" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"/></head>
<body><div class="card">
  <div class="eyebrow">Components · Form fields</div>
  <p class="caption" style="max-width:520px;margin-bottom:18px">
    Labels use Syne SemiBold (10px, +0.16em, caps) — the same eyebrow voice as section labels. Field values use Fira Sans, our body face.
  </p>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
    <label style="display:flex;flex-direction:column;gap:8px">
      <span style="font-family:var(--font-syne);font-weight:600;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-muted)">Child's name</span>
      <input value="Lin Hui" style="font-family:var(--font-body);font-size:15px;color:var(--fg-strong);background:var(--bg-raised);border:1px solid var(--line-strong);border-radius:10px;padding:12px 14px;outline:none"/>
    </label>

    <label style="display:flex;flex-direction:column;gap:8px">
      <span style="font-family:var(--font-syne);font-weight:600;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-muted)">Age</span>
      <select style="font-family:var(--font-body);font-size:15px;color:var(--fg-strong);background:var(--bg-raised);border:1px solid var(--line-strong);border-radius:10px;padding:12px 14px;outline:none">
        <option>4 years</option><option>5 years</option><option>6 years</option>
      </select>
    </label>

    <label style="display:flex;flex-direction:column;gap:8px;grid-column:1/-1">
      <span style="font-family:var(--font-syne);font-weight:600;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-muted)">A note from you</span>
      <textarea rows="2" style="font-family:var(--font-body);font-size:15px;color:var(--fg-strong);background:var(--bg-raised);border:1px solid var(--line-strong);border-radius:10px;padding:12px 14px;outline:none;resize:none">She loves drawing and being outside.</textarea>
    </label>

    <label style="display:flex;align-items:center;gap:10px;grid-column:1/-1;font-family:var(--font-body);font-size:14px;color:var(--fg-strong)">
      <span style="width:18px;height:18px;border-radius:5px;border:1px solid var(--tw-burnham);background:var(--tw-burnham);display:inline-flex;align-items:center;justify-content:center;color:var(--tw-smoke);font-size:12px">✓</span>
      I'd like to walk through the gardens during the visit.
    </label>
  </div>

  <div style="margin-top:24px;font-family:var(--font-body);font-size:12px;color:var(--fg-muted);line-height:1.55">
    Labels: <strong style="color:var(--fg-strong)">Syne SemiBold 10/.16em caps</strong> ·
    Values: <strong style="color:var(--fg-strong)">Fira Sans 15</strong> ·
    Borders: 1px Burnham 26% · Radius: 10px
  </div>
</div></body></html>
