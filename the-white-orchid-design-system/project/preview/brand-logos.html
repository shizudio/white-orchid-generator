<!doctype html>
<!-- @dsCard group="Brand" name="Logo lockups" subtitle="Vertical, horizontal, circle, on-green" viewport="760x420" --><html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body><div class="card">
  <div class="eyebrow">Brand · Logo lockups</div>
  <h2 class="title">One mark, six lockups.</h2>

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:8px">
    <!-- Vertical -->
    <div style="text-align:center;background:var(--bg-raised);border:1px solid var(--line);border-radius:14px;padding:22px 14px">
      <img src="../assets/logo-central-green.png" style="width:auto;max-height:120px;max-width:100%;object-fit:contain" alt="Vertical lockup"/>
      <div class="caption" style="margin-top:12px">Vertical lockup · primary</div>
    </div>
    <!-- Horizontal -->
    <div style="text-align:center;background:var(--bg-raised);border:1px solid var(--line);border-radius:14px;padding:22px 14px;display:flex;flex-direction:column;justify-content:center">
      <img src="../assets/logo-1-green.png" style="width:100%;max-height:60px;object-fit:contain" alt="Horizontal lockup"/>
      <div class="caption" style="margin-top:12px">Horizontal lockup</div>
    </div>
    <!-- Circle -->
    <div style="text-align:center;background:var(--bg-raised);border:1px solid var(--line);border-radius:14px;padding:22px 14px;display:flex;flex-direction:column;justify-content:center;align-items:center">
      <img src="../assets/logo-circle.png" style="width:96px;height:96px;object-fit:contain" alt="Circle badge"/>
      <div class="caption" style="margin-top:12px">Circle · favicon / avatar</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:18px">
    <!-- Flat green -->
    <div style="text-align:center;background:var(--bg-raised);border:1px solid var(--line);border-radius:14px;padding:22px 14px;display:flex;flex-direction:column;justify-content:center;align-items:center">
      <img src="../assets/logo-3-green.png" style="width:88px;max-height:88px;object-fit:contain" alt="Motif green"/>
      <div class="caption" style="margin-top:12px">Motif · green</div>
    </div>
    <!-- On green circle -->
    <div style="text-align:center;background:var(--tw-burnham);border-radius:14px;padding:22px 14px;display:flex;flex-direction:column;justify-content:center;align-items:center">
      <img src="../assets/logo-circle.png" style="width:96px;height:96px;object-fit:contain" alt="Circle on green"/>
      <div class="caption" style="margin-top:12px;color:var(--tw-celadon)">Circle · on Burnham</div>
    </div>
    <!-- Ivory on green -->
    <div style="text-align:center;background:var(--tw-burnham);border-radius:14px;padding:22px 14px;display:flex;flex-direction:column;justify-content:center;align-items:center">
      <img src="../assets/logo-1-ivory.png" style="width:100%;max-height:56px;object-fit:contain" alt="Ivory lockup on green"/>
      <div class="caption" style="margin-top:12px;color:var(--tw-celadon)">Ivory lockup · on Burnham</div>
    </div>
  </div>
</div></body></html>
